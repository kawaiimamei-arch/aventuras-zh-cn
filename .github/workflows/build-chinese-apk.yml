name: Build Chinese APK (简体中文)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  actions: write

jobs:
  build-android:
    name: Build Android APK (Chinese)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK (Release)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --target aarch64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aventuras-zh-cn-release
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          if-no-files-found: error

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          name: "Aventuras 简体中文版 - Latest Build"
          tag_name: zh-cn-latest
          body: |
            # Aventuras 简体中文版 APK

            此版本已修改为默认使用简体中文界面和输出。

            ## 修改内容
            - 所有 AI 系统提示词已添加中文输出指令
            - 翻译系统默认启用，目标语言为简体中文 (zh)
            - 叙事情境构建器默认使用中文语言环境
            - 所有叙事引导消息包含中文输出要求

            ## 安装说明
            1. 下载下方 APK 文件
            2. 允许安装未知来源应用
            3. 安装并打开应用
            4. 在设置中配置 API（例如 OpenRouter）

            ## 注意
            这是基于 Aventuras v0.7.6 的修改版本。
            原始项目: https://github.com/AventurasTeam/Aventuras
          draft: false
          prerelease: false
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
