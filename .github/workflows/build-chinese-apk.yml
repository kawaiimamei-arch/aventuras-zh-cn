name: Build Chinese APK (简体中文 Debug)

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  actions: write

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Install dependencies
        run: npm ci

      - name: Build Android Debug APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --debug --target aarch64

      - name: Locate Debug APK
        id: apk-path
        run: |
          APK_FILE=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          echo "apk=$APK_FILE" >> "$GITHUB_OUTPUT"
          echo "APK found at: $APK_FILE"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aventuras-zh-cn-debug-apk
          path: ${{ steps.apk-path.outputs.apk }}
          if-no-files-found: error

      - name: Delete old zh-cn-latest release
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/zh-cn-latest" | \
            jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted old release id=$RELEASE_ID"
          fi
          # Also delete the old tag so we can re-create it
          git push origin :refs/tags/zh-cn-latest 2>/dev/null || true

      - name: Publish Debug APK Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Aventuras 简体中文版 - Debug APK"
          tag_name: zh-cn-latest
          body: |
            # Aventuras 简体中文版 APK（Debug 签名）

            ✅ **可直接安装** — 使用 Android Debug 签名

            ## 修改内容
            - AI 系统提示词全部添加简体中文输出指令
            - 翻译系统默认启用，目标语言为 zh（简体中文）
            - 叙事引导消息包含中文输出要求
            - 基于 Aventuras v0.7.6 | 原始项目: https://github.com/AventurasTeam/Aventuras
          draft: false
          prerelease: false
          files: ${{ steps.apk-path.outputs.apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
